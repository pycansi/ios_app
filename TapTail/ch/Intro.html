<h1>应用名称</h1>
<p>TapTail</p>

<h1>介绍</h1>
<p>针对快速记账进行极致优化，最大化减轻记账负担，打造自己的现金流量表，分析钱财流向。</p>

<h2>应用特征</h2>
<p>- 隐私优先，纯本地应用，数据安全无忧</p>
<p>- 记账页面常驻，每次打开应用即可直接记账</p>
<p>- 收支类型及其排序自定义，方便快速选择（左滑编辑、删除，长按调整排序）</p>
<p>- 拒绝数据孤岛，自选时间段内账目一键导出</p>
<p>- 内置收支统计，可选择导出至Excel进行详细分析</p>
<p>- 无广告，无内购</p>
